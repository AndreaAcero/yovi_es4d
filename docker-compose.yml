version: "3.9"

services:

  mongodb:
    container_name: mongodb_es4d
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - mynetwork

  authservice:
    container_name: authservice-yovi_es4d
    image: ghcr.io/arquisoft/yovi_es4d/authservice:latest
    volumes:
      - mongodb_data:/data/db
    depends_on:
      - mongodb
    ports:
      - "8002:8002"
    networks:
      - mynetwork
    environment:
      MONGODB_URI: mongodb://mongodb:27017/usersdb
      JWT_SECRET: your-secret-key

  userservice:
    container_name: userservice-yovi_es4d
    image: ghcr.io/arquisoft/yovi_es4d/userservice:latest
    volumes:
      - mongodb_data:/data/db
    depends_on:
      - mongodb
    ports:
      - "8001:8001"
    networks:
      - mynetwork
    environment:
      MONGODB_URI: mongodb://mongodb:27017/usersdb

  gamey:
    container_name: gamey-yovi_es4d
    image: ghcr.io/arquisoft/yovi_es4d/gamey:latest
    volumes:
      - mongodb_data:/data/db
    ports:
      - "4000:4000"
    networks:
      - mynetwork
    depends_on:
      - game
    environment:
      MONGODB_URI: mongodb://mongodb:27017/usersdb
      GAME_URI: http://game:8003

  game:
    container_name: game-yovi_es4d
    image: ghcr.io/arquisoft/yovi_es4d/game:latest
    volumes:
      - mongodb_data:/data/db
    ports:
      - "8003:8003"
    networks:
      - mynetwork
    depends_on:
      - userservice
      - gamey
    environment:
      PORT: 8003
      MONGODB_URI: mongodb://mongodb:27017/gamedb
      GAMEY_BOT_URL: http://gamey:4000
      USERS_URL: http://userservice:8001

  gateway:
    container_name: gateway-yovi_es4d
    image: ghcr.io/arquisoft/yovi_es4d/gateway:latest
    depends_on:
      - authservice
      - userservice
      - game
    ports:
      - "8000:8000"
    networks:
      - mynetwork
    environment:
      AUTH_SERVICE_URL: http://authservice:8002
      USER_SERVICE_URL: http://userservice:8001
      GAME_SERVICE_URL: http://game:8003
      TOKEN_SECRET_KEY: your-secret-key

  webapp:
    container_name: webapp_es4d
    image: ghcr.io/arquisoft/yovi_es4d/webapp:latest
    depends_on:
      - gateway
    ports:
      - "5173:5173"
    networks:
      - mynetwork
    environment:
      VITE_API_URL: http://gateway:8000

  prometheus:
    image: prom/prometheus
    container_name: prometheus-yovi_es4d
    profiles: ["dev", "prod"]
    networks:
      - mynetwork
    volumes:
      - ./gateway/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana
    container_name: grafana-yovi_es4d
    profiles: ["dev", "prod"]
    networks:
      - mynetwork
    volumes:
      - grafana_data:/var/lib/grafana
      - ./gateway/monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SERVER_HTTP_PORT: 9091
      GF_AUTH_DISABLE_LOGIN_FORM: true
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "9091:9091"
    depends_on:
      - prometheus

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  mynetwork:
    driver: bridge
