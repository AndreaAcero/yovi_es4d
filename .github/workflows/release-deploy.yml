name: Release — Build & Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  # Push user service Docker image
  docker-push-userservice:
    name: Push User Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish User Service
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: arquisoft/yovi_es4d/userservice:${{ env.IMAGE_TAG }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users/userservice

  # Push auth service Docker image
  docker-push-authservice:
    name: Push Auth Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Publish Auth Service
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: arquisoft/yovi_es4d/authservice:${{ env.IMAGE_TAG }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users/authservice

  # Push webapp Docker image
  docker-push-webapp:
    name: Push Webapp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Webapp
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/yovi_es4d-webapp:${{ env.IMAGE_TAG }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp

  # Push gamey Docker image
  docker-push-gamey:
    name: Push Gamey
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Gamey
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/yovi_es4d-gamey:${{ env.IMAGE_TAG }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gamey

  # Push game Docker image
  docker-push-game:
    name: Push Game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Game
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/yovi_es4d-game:${{ env.IMAGE_TAG }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: game

  # Push gateway Docker image
  docker-push-gateway:
    name: Push Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Gateway
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/yovi_es4d-gateway:${{ env.IMAGE_TAG }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gateway

  # Deploy over SSH
  deploy:
    name: Deploy on Server
    runs-on: ubuntu-latest
    needs: [
      docker-push-userservice,
      docker-push-authservice,
      docker-push-webapp,
      docker-push-gamey,
      docker-push-game,
      docker-push-gateway
    ]
    steps:
      - name: Deploy over SSH
        uses: fifsky/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          user: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command: |
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            wget https://raw.githubusercontent.com/${{ github.repository_owner }}/yovi_es4d/${{ env.IMAGE_TAG }}/docker-compose.yml -O docker-compose.yml
            docker compose down
            docker compose --profile dev up -d --pull always